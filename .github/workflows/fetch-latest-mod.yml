name: Debug Build

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    paths:
      - 'src/**'
      - '.github/workflows/debug-build.yml'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'dependencies.gradle'
      - 'repositories.gradle'
      - 'gradle/**'
      - 'gradlew'
      - '.java-version'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java from .java-version
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version-file: .java-version
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run Gradle build and capture log
        id: gradle_build
        shell: bash
        run: |
          set +e
          ./gradlew --no-daemon --stacktrace --console=plain build 2>&1 | tee build.log
          status=${PIPESTATUS[0]}

          grep -nE ':[0-9]+: error:|cannot find symbol|symbol:|location:|package .* does not exist|^FAILURE: Build failed|^\* What went wrong:|^Caused by:|^Exception is:' build.log > compile-errors.txt || true

          {
            echo "## Build exit code"
            echo
            echo "\`$status\`"
            echo
            echo "## Extracted errors"
            echo
            if [ -s compile-errors.txt ]; then
              sed -n '1,200p' compile-errors.txt
            else
              echo "No filtered compile errors found. Check build.log."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Collect Minecraft sources jar
        if: always()
        shell: bash
        run: |
          mkdir -p dist

          src_dir=""

          # 常见位置先试
          for d in \
            build/tmp/decompile/forge-1.7.10-10.13.4.1614-1.7.10-sources \
            build/tmp/decompile \
            build/rfg \
            build/tmp \
            build \
            "$HOME/.gradle"
          ; do
            if [ -d "$d" ]; then
              hit="$(find "$d" -type d \( -iname '*decomp*sources*' -o -iname '*minecraft*sources*' -o -iname '*forge*1.7.10*sources*' -o -iname '*sources*' \) 2>/dev/null | head -n 1 || true)"
              if [ -n "$hit" ]; then
                src_dir="$hit"
                break
              fi
            fi
          done

          if [ -z "$src_dir" ]; then
            echo "Could not find a Minecraft sources directory"
            echo "Top build tree:"
            find build -maxdepth 5 \( -type d -o -type f \) 2>/dev/null | sed -n '1,300p' || true
            exit 0
          fi

          echo "Using sources dir: $src_dir"

          # 打成 sources jar
          (
            cd "$src_dir"
            zip -qr "$GITHUB_WORKSPACE/dist/minecraft-1.7.10-sources.jar" .
          )

          ls -lh "$GITHUB_WORKSPACE/dist/minecraft-1.7.10-sources.jar"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-build-logs
          path: |
            build.log
            compile-errors.txt
          if-no-files-found: ignore

      - name: Upload Minecraft sources jar
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-sources
          path: dist/minecraft-1.7.10-sources.jar
          if-no-files-found: ignore

      - name: Fail workflow if build failed
        if: steps.gradle_build.outputs.exit_code != '0'
        run: |
          echo "Build failed. See Summary and artifact debug-build-logs."
          test -f compile-errors.txt && cat compile-errors.txt || true
          exit 1