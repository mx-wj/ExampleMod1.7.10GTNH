name: Build offline bundle

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]

jobs:
  offline-bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle-home

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Prepare bundle directories
        run: |
          mkdir -p offline-bundle/env
          mkdir -p offline-bundle/gradle-sizes
          mkdir -p offline-bundle/gradle-parts

      - name: Record tool versions
        run: |
          echo "JAVA_HOME=$JAVA_HOME" | tee offline-bundle/env/java-home.txt
          java -version 2>&1 | tee offline-bundle/env/java-version.txt
          ./gradlew --version | tee offline-bundle/env/gradle-version.txt
          uname -a | tee offline-bundle/env/uname.txt

      - name: Online warm-up build
        run: |
          ./gradlew --no-daemon setupDecompWorkspace build --refresh-dependencies

      - name: Verify offline build
        run: |
          ./gradlew --no-daemon --offline build

      - name: Collect environment snapshot
        run: |
          env | sort > offline-bundle/env/environment.txt
          ls -la > offline-bundle/env/workspace-root.txt
          find . -maxdepth 3 -type f | sort > offline-bundle/env/files-maxdepth3.txt || true

      - name: Inspect Gradle user home size
        run: |
          du -sh "$GRADLE_USER_HOME" > offline-bundle/gradle-sizes/total.txt
          du -sh "$GRADLE_USER_HOME"/* 2>/dev/null | sort -h > offline-bundle/gradle-sizes/top-level.txt || true
          du -h -d 3 "$GRADLE_USER_HOME" 2>/dev/null | sort -h > offline-bundle/gradle-sizes/du-depth3.txt || true

      - name: Pack project source
        run: |
          tar \
            --exclude-vcs \
            --exclude='./.git' \
            --exclude='./.gradle-home' \
            --exclude='./offline-bundle' \
            --exclude='./build' \
            -czf offline-bundle/project-src.tar.gz \
            .

      - name: Pack project build output
        run: |
          if [ -d build ]; then
            tar -czf offline-bundle/project-build.tar.gz build
          fi

      - name: Pack Gradle caches
        run: |
          if [ -d "$GRADLE_USER_HOME/caches" ]; then
            tar -C "$GRADLE_USER_HOME" -czf offline-bundle/gradle-parts/gradle-caches.tar.gz caches
          fi

      - name: Pack Gradle wrapper distributions
        run: |
          if [ -d "$GRADLE_USER_HOME/wrapper" ]; then
            tar -C "$GRADLE_USER_HOME" -czf offline-bundle/gradle-parts/gradle-wrapper.tar.gz wrapper
          fi

      - name: Pack downloaded JDKs
        run: |
          if [ -d "$GRADLE_USER_HOME/jdks" ]; then
            tar -C "$GRADLE_USER_HOME" -czf offline-bundle/gradle-parts/gradle-jdks.tar.gz jdks
          fi

      - name: Upload offline bundle
        uses: actions/upload-artifact@v4
        with:
          name: offline-bundle
          path: |
            offline-bundle/project-src.tar.gz
            offline-bundle/project-build.tar.gz
            offline-bundle/gradle-parts/*
            offline-bundle/gradle-sizes/*
            offline-bundle/env/*
          if-no-files-found: error
          retention-days: 7
          compression-level: 0
